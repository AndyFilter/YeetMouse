name: CI (Build + Test)

on:
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libglfw3-dev linux-headers-$(uname -r)

      - name: Build YeetMouse (driver + GUI + yeetmousectl)
        run: |
          make driver GUI yeetmousectl

      - name: Build tests
        run: |
          cmake -S tests -B tests/build
          cmake --build tests/build

      - name: Run tests
        working-directory: tests/build
        run: ./YeetMouseTests